events {
    worker_connections 1024;
}

http {
    # 如果您有多个子节点，可以将它们的 IP 配置在这里。
    # Nginx 会负责将客户端拉取镜像的请求分发到这些子节点上。
    upstream worker_nodes {
        # 使用哈希策略，确保获取同一镜像分层（layer）的请求总是落在相同的Worker上
        # 这样能最大化缓存命中率，避免多台机器重复拉取同一个层
        hash $request_uri consistent;

        # 示例：请替换为您的 Worker 节点真实 IP
        # 假设 Worker1 的 IP 是 192.168.1.101，开放了 5000 端口
        # server 192.168.1.101:5000 max_fails=3 fail_timeout=30s;
        
        # 假设 Worker2 的 IP 是 192.168.1.102，开放了 5000 端口
        # server 192.168.1.102:5000 max_fails=3 fail_timeout=30s;

        # 为了本地测试，暂时将这台机器的 5001 端口作为一个 worker
        # 实际生产中您应该删除这一行，并取消注释上面的 server 配置
        server 127.0.0.1:5001;
    }

    server {
        listen 80;
        server_name _; # 如果有域名，可以将此处 _ 替换为您自己的域名

        # 解决拉取巨大镜像报 413 Request Entity Too Large 的问题
        client_max_body_size 0;

        # 禁用缓冲，支持流式下载和推送镜像
        proxy_buffering off;
        proxy_request_buffering off;

        location / {
            proxy_pass http://worker_nodes;
            
            # 透传客户端真实的 Header 信息给后端的 Worker
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 900;
        }
    }
}
